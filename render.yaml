services:
  - name: airpulse-minor-project
    type: web
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_DEBUG
        value: "False"
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: OPENAI_API_KEY
        sync: false
      - key: WAQI_API_TOKEN
        sync: false
      - key: IPINFO_TOKEN
        sync: false
      - key: LOCATION_API_TOKEN
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: GETTY_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_LOGIN_USER
        sync: false
      - key: SMTP_SENDER_NAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        sync: false
